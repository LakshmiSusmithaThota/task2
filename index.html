<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Task 2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
 <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
 
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow auth-card">
    <h3 class="text-center mb-3">Login</h3>

    <form onsubmit="return loginValidate()">
      <div class="mb-3">
        <label>Email</label>
        <input type="email" id="loginEmail" class="form-control">
      </div>

      <div class="mb-3">
        <label>Password</label>
        <div class="input-group">
          <input type="password" id="loginPassword" class="form-control">
          <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('loginPassword')">👁</button>
        </div>
      </div>

      <button class="btn btn-primary w-100">Login</button>
    </form>

    <p class="text-center mt-3">
      New user? <a href="register.html">Register</a>
    </p>

    <p id="loginMsg" class="text-center text-success mt-2"></p>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
