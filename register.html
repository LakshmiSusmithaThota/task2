<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | Task 2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow auth-card">
    <h3 class="text-center mb-3">Register</h3>

    <form onsubmit="return registerValidate()">
      <div class="mb-3">
        <label>Name</label>
        <input type="text" id="regName" class="form-control">
      </div>

      <div class="mb-3">
        <label>Email</label>
        <input type="email" id="regEmail" class="form-control">
      </div>

      <div class="mb-3">
        <label>Password</label>
        <input type="password" id="regPassword" class="form-control">
      </div>

      <div class="mb-3">
        <label>Confirm Password</label>
        <input type="password" id="regConfirm" class="form-control">
      </div>

      <button class="btn btn-success w-100">Register</button>
    </form>

    <p class="text-center mt-3">
      Already registered? <a href="index.html">Login</a>
    </p>

    <p id="registerMsg" class="text-center text-success mt-2"></p>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
